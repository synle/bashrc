name: build-main

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode"
        type: choice
        default: test_only
        options:
          - test_only
          - clean_rebuild

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Phase 1: Format code, build include, and build webapp (no commit, upload patch) ----
  prep:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      ci-prep-outcome: ${{ steps.ci-prep.outcome }}
      ci-prep-duration: ${{ steps.prep-summary.outputs.ci-prep-duration }}
      total-duration: ${{ steps.prep-summary.outputs.total-duration }}
      job-start-time: ${{ steps.prep-start.outputs.start-time }}
    steps:
      - name: Record start time
        id: prep-start
        run: |
          echo "PREP_T0=$(date +%s)" >> "$GITHUB_ENV"
          echo "start-time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci-setup

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Record time before ci-prep
        if: always()
        run: echo "PREP_T1=$(date +%s)" >> "$GITHUB_ENV"

      - name: CI Prep
        id: ci-prep
        env:
          # Required by ci-download-release-binaries.sh — gh release upload/view
          # against synle/bashrc's binary-cache rolling release. Job already has
          # `contents: write` so github.token is sufficient.
          GH_TOKEN: ${{ github.token }}
        run: make ci_prep

      - name: Record time after ci-prep
        if: always()
        run: echo "PREP_T2=$(date +%s)" >> "$GITHUB_ENV"

      - name: Commit prep changes (clean rebuild)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild' }}
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - Prep (clean rebuild)"
          default_author: github_actions
          pull: "--rebase --autostash"

      - name: Create prep patch
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        run: |
          mkdir -p /tmp/ci-patches/prep-patch
          git add -A
          git diff --cached --binary > /tmp/ci-patches/prep-patch/prep-patch.patch
          echo "Prep patch size: $(wc -c < /tmp/ci-patches/prep-patch/prep-patch.patch) bytes"

      - name: Upload prep patch
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        uses: actions/upload-artifact@v7
        with:
          name: prep-patch
          path: /tmp/ci-patches/prep-patch/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload webapp dist
        uses: actions/upload-artifact@v7
        with:
          name: webapp-dist
          path: dist/
          retention-days: 14
          if-no-files-found: ignore

      - name: Prep Summary
        id: prep-summary
        if: always()
        run: |
          function get_status_icon() {
            case "$1" in
              success)  echo ":white_check_mark:" ;;
              failure)  echo ":x:" ;;
              skipped)  echo ":fast_forward:" ;;
              cancelled) echo ":no_entry_sign:" ;;
              *)        echo ":grey_question:" ;;
            esac
          }

          function format_duration() {
            local total=$1
            if [ "$total" -ge 60 ]; then
              printf "%dm %ds" $((total / 60)) $((total % 60))
            else
              printf "%ds" "$total"
            fi
          }

          D_CI_PREP=$(( ${PREP_T2:-$PREP_T1} - ${PREP_T1:-$PREP_T0} ))
          D_TOTAL=$(( ${PREP_T2:-$PREP_T0} - PREP_T0 ))

          echo "## Prep Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | Step | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ steps.ci-prep.outcome }}') | CI Prep | $(format_duration $D_CI_PREP) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| | **Prep Total** | **$(format_duration $D_TOTAL)** |" >> "$GITHUB_STEP_SUMMARY"

          echo "ci-prep-duration=$D_CI_PREP" >> "$GITHUB_OUTPUT"
          echo "total-duration=$D_TOTAL" >> "$GITHUB_OUTPUT"

  # ---- Phase 2: All OS builds run in parallel (apply prep patch first) ----
  build-ubuntu:
    needs: [prep]
    if: >-
      ${{
        !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only')
        && (needs.prep.result == 'success' || needs.prep.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      duration: ${{ steps.ci-build.outputs.duration }}
      binary-check-summary: ${{ steps.ci-build.outputs.binary-check-summary }}
      binary-check-status: ${{ steps.ci-build.outputs.binary-check-status }}
      binary-check-failed-list: ${{ steps.ci-build.outputs.binary-check-failed-list }}
      binary-check-warned-list: ${{ steps.ci-build.outputs.binary-check-warned-list }}
      download-check-summary: ${{ steps.ci-build.outputs.download-check-summary }}
      download-check-status: ${{ steps.ci-build.outputs.download-check-status }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch
      - uses: ./.github/actions/ci-build
        id: ci-build
        with:
          artifact-name: build-ubuntu

  build-rhel:
    needs: [prep]
    if: >-
      ${{
        !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only')
        && (needs.prep.result == 'success' || needs.prep.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    container: fedora:latest
    timeout-minutes: 20
    outputs:
      duration: ${{ steps.ci-build.outputs.duration }}
      binary-check-summary: ${{ steps.ci-build.outputs.binary-check-summary }}
      binary-check-status: ${{ steps.ci-build.outputs.binary-check-status }}
      binary-check-failed-list: ${{ steps.ci-build.outputs.binary-check-failed-list }}
      binary-check-warned-list: ${{ steps.ci-build.outputs.binary-check-warned-list }}
      download-check-summary: ${{ steps.ci-build.outputs.download-check-summary }}
      download-check-status: ${{ steps.ci-build.outputs.download-check-status }}
    steps:
      - name: Install dependencies
        run: dnf install -y git curl sudo findutils make
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch
      - uses: ./.github/actions/ci-build
        id: ci-build
        with:
          artifact-name: build-rhel

  build-arch:
    needs: [prep]
    if: >-
      ${{
        !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only')
        && (needs.prep.result == 'success' || needs.prep.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    container: archlinux:latest
    continue-on-error: true
    timeout-minutes: 20
    outputs:
      duration: ${{ steps.ci-build.outputs.duration }}
      binary-check-summary: ${{ steps.ci-build.outputs.binary-check-summary }}
      binary-check-status: ${{ steps.ci-build.outputs.binary-check-status }}
      binary-check-failed-list: ${{ steps.ci-build.outputs.binary-check-failed-list }}
      binary-check-warned-list: ${{ steps.ci-build.outputs.binary-check-warned-list }}
      download-check-summary: ${{ steps.ci-build.outputs.download-check-summary }}
      download-check-status: ${{ steps.ci-build.outputs.download-check-status }}
    steps:
      - name: Install dependencies
        run: pacman -Sy --noconfirm git curl sudo make unzip
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch
      - uses: ./.github/actions/ci-build
        id: ci-build
        with:
          artifact-name: build-arch

  build-debian:
    needs: [prep]
    if: >-
      ${{
        !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only')
        && (needs.prep.result == 'success' || needs.prep.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    container: debian:latest
    continue-on-error: true
    timeout-minutes: 20
    outputs:
      duration: ${{ steps.ci-build.outputs.duration }}
      binary-check-summary: ${{ steps.ci-build.outputs.binary-check-summary }}
      binary-check-status: ${{ steps.ci-build.outputs.binary-check-status }}
      binary-check-failed-list: ${{ steps.ci-build.outputs.binary-check-failed-list }}
      binary-check-warned-list: ${{ steps.ci-build.outputs.binary-check-warned-list }}
      download-check-summary: ${{ steps.ci-build.outputs.download-check-summary }}
      download-check-status: ${{ steps.ci-build.outputs.download-check-status }}
    steps:
      - name: Install dependencies
        run: apt-get update -y && apt-get install -y git curl sudo make
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch
      - uses: ./.github/actions/ci-build
        id: ci-build
        with:
          artifact-name: build-debian

  build-mac:
    needs: [prep]
    if: >-
      ${{
        !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only')
        && (needs.prep.result == 'success' || needs.prep.result == 'skipped')
      }}
    runs-on: macos-latest
    timeout-minutes: 20
    outputs:
      duration: ${{ steps.ci-build.outputs.duration }}
      binary-check-summary: ${{ steps.ci-build.outputs.binary-check-summary }}
      binary-check-status: ${{ steps.ci-build.outputs.binary-check-status }}
      binary-check-failed-list: ${{ steps.ci-build.outputs.binary-check-failed-list }}
      binary-check-warned-list: ${{ steps.ci-build.outputs.binary-check-warned-list }}
      download-check-summary: ${{ steps.ci-build.outputs.download-check-summary }}
      download-check-status: ${{ steps.ci-build.outputs.download-check-status }}
    steps:
      - uses: actions/checkout@v6
      - name: Install GNU Make
        run: |
          brew install make unzip bash
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> "$GITHUB_PATH"
      - uses: ./.github/actions/ci-setup
      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch
      - uses: ./.github/actions/ci-build
        id: ci-build
        with:
          artifact-name: build-mac

  # ---- Phase 3: Merge build artifacts, apply prep patch, single commit, and deploy ----
  publish:
    needs: [prep, build-ubuntu, build-rhel, build-arch, build-debian, build-mac]
    if: >-
      ${{
        (needs.build-ubuntu.result == 'success' && needs.build-rhel.result == 'success' && needs.build-arch.result == 'success' && needs.build-debian.result == 'success' && needs.build-mac.result == 'success')
        || (github.event_name == 'workflow_dispatch' && needs.build-ubuntu.result == 'skipped' && needs.build-rhel.result == 'skipped' && needs.build-arch.result == 'skipped' && needs.build-debian.result == 'skipped' && needs.build-mac.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      statuses: write # for mirroring this run as a commit status on the amended SHA
    steps:
      - uses: actions/checkout@v6
        # fetch-depth: 0 is REQUIRED here. Default (depth=1) gives a shallow clone
        # where HEAD's parent isn't fetched locally; `git commit --amend` then treats
        # HEAD as the initial commit and produces a PARENTLESS root commit. The
        # subsequent `git push --force-with-lease` overwrites the branch with that
        # orphan, wiping all prior history (including unrelated user commits).
        # Reproduces with: `git clone --depth=1 ... && git commit --amend`.
        with:
          fetch-depth: 0
      - uses: ./.github/actions/ci-setup

      - uses: ./.github/actions/ci-apply-patches
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        with:
          patches: prep-patch

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/build-artifacts/
          pattern: build-*
          # merge-multiple: false — each artifact lands in its own subdir (build-ubuntu, build-arch, ...)
          # so same-named files from different OS builds don't race-overlay each other (see next step).

      - name: Merge build artifacts into .build/
        # `actions/download-artifact@v8` with `merge-multiple: true` has been observed to overwrite
        # same-named files without truncating, leaving the longer file's tail appended to the shorter
        # file's content — producing corrupt profiles. Copy explicitly instead: bash `cp -f` truncates
        # on overwrite, so the last source in this deterministic order wins cleanly. Order matters
        # only for same-named files; each OS's unique `profile_bashrc_<os>.sh` is not affected.
        run: |
          for artifact_dir in /tmp/build-artifacts/build-arch /tmp/build-artifacts/build-rhel /tmp/build-artifacts/build-debian /tmp/build-artifacts/build-ubuntu /tmp/build-artifacts/build-mac; do
            [ -d "$artifact_dir" ] || continue
            echo "Merging $artifact_dir -> .build/"
            cp -rfT "$artifact_dir" .build/
          done
          ls -la .build/profile_bashrc_*.sh 2>/dev/null || true

      - name: Commit Changes
        # Amend HEAD with formatting + build artifacts and force-push, instead of stacking
        # a fresh "CI / CD - ..." commit on every push. Keeps the original commit message
        # intact and appends a CI marker so the trailer makes the amend visible in the log.
        # `--force-with-lease` guards against losing a concurrent push (concurrency group
        # already cancels in-progress runs, so this is belt-and-suspenders).
        id: commit-amend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to amend"
            echo "amended=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          original_message=$(git log -1 --pretty=%B)
          new_message="${original_message}

          CI / CD - Format code and build artifacts"
          git commit --amend -m "$new_message"
          git push --force-with-lease
          new_sha=$(git rev-parse HEAD)
          echo "amended=true" >> "$GITHUB_OUTPUT"
          echo "new-sha=$new_sha" >> "$GITHUB_OUTPUT"

          # Mirror this workflow run as a commit status on the amended SHA. The
          # workflow run itself is bound to the ORIGINAL trigger SHA, so without
          # this the amended HEAD shows no checks in the GitHub commit UI even
          # though the run succeeded. Status API works with the default GITHUB_TOKEN.
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          # Don't fail the job if status mirroring is denied — the push already
          # succeeded; the missing check on the amended SHA is cosmetic.
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${new_sha}" \
            -f state=success \
            -f context="build-main / publish" \
            -f description="Amended from ${GITHUB_SHA:0:7} (run #${GITHUB_RUN_NUMBER})" \
            -f target_url="${run_url}" \
            || echo "::warning::Could not publish commit status on ${new_sha} (continuing)"

      - name: Create publish patch
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        run: |
          mkdir -p /tmp/ci-patches/publish-patch
          git diff HEAD~1 --binary > /tmp/ci-patches/publish-patch/publish-patch.patch || true
          echo "Publish patch size: $(wc -c < /tmp/ci-patches/publish-patch/publish-patch.patch) bytes"

      - name: Upload publish patch
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'clean_rebuild') }}
        uses: actions/upload-artifact@v7
        with:
          name: publish-patch
          path: /tmp/ci-patches/publish-patch/
          retention-days: 14
          if-no-files-found: ignore

      - name: Download webapp dist
        if: github.event_name == 'push'
        uses: actions/download-artifact@v8
        with:
          name: webapp-dist
          path: dist/

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: actions/deploy-pages@v4

      - name: Overall Summary
        if: always()
        run: |
          function format_filesize() {
            local bytes=$1
            if [ "$bytes" -ge 1048576 ]; then
              awk "BEGIN{printf \"%.1f MB\", $bytes/1048576}"
            elif [ "$bytes" -ge 1024 ]; then
              awk "BEGIN{printf \"%.1f KB\", $bytes/1024}"
            else
              printf "%d B" "$bytes"
            fi
          }

          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary><h2>Build Artifacts (.build/)</h2></summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | File Size | Char Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----------|------------|" >> "$GITHUB_STEP_SUMMARY"
          for f in .build/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            fsize=$(wc -c < "$f" | tr -d ' ')
            ccount=$(wc -m < "$f" | tr -d ' ')
            echo "| \`$fname\` | $(format_filesize $fsize) | ${ccount} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

  # ---- Phase 4: Unit tests and smoke test ----
  test:
    needs: [prep, build-ubuntu, build-rhel, build-arch, build-debian, build-mac, publish]
    if: ${{ needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: ./.github/actions/ci-setup

      # Apply patches from prep+publish when running after a full build (push only; manual modes skip patches)
      - name: Apply patches from build pipeline
        if: ${{ github.event_name == 'push' }}
        uses: ./.github/actions/ci-apply-patches
        with:
          patches: prep-patch,publish-patch

      - name: Download profile debug artifacts
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only') }}
        uses: actions/download-artifact@v8
        with:
          path: /tmp/profile-debug
          pattern: profile-debug-build-*
          merge-multiple: false

      - name: Download per-OS install summaries
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only') }}
        uses: actions/download-artifact@v8
        with:
          path: /tmp/install-summaries
          pattern: logs-build-*
          merge-multiple: false

      - name: Copy profile debug snapshots into .build
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.run_mode == 'test_only') }}
        run: |
          # Map artifact OS names to profile OS names used in .build/
          # artifact: build-ubuntu → ubuntu, build-rhel → redhat, build-arch → arch_linux,
          #           build-debian → ubuntu (debian uses ubuntu profile), build-mac → mac
          function map_os_name() {
            case "$1" in
              ubuntu) echo "ubuntu" ;;
              rhel)   echo "redhat" ;;
              arch)   echo "arch_linux" ;;
              debian) echo "ubuntu" ;;
              mac)    echo "mac" ;;
              *)      echo "$1" ;;
            esac
          }

          for artifact_dir in /tmp/profile-debug/profile-debug-build-*/; do
            [ -d "$artifact_dir" ] || continue
            build_os=$(basename "$artifact_dir" | sed 's/^profile-debug-build-//')
            os_name=$(map_os_name "$build_os")

            # detect the CI home path used during this build from the snapshot content
            ci_home=""
            for candidate in "/github/home" "/home/runner" "/Users/runner"; do
              if command grep -q "$candidate" "$artifact_dir"bash_syle.* 2>/dev/null; then
                ci_home="$candidate"
                break
              fi
            done

            for f in "$artifact_dir"bash_syle.*; do
              [ -f "$f" ] || continue
              snapshot=$(basename "$f" | sed 's/^bash_syle\.//')
              target=".build/profile_bashrc_${os_name}_${snapshot}.sh"
              cp "$f" "$target"

              # normalize CI home path to ~ and username for stable diffs across runners
              if [ -n "$ci_home" ]; then
                sed -i \
                  -e "s|$ci_home|~|g" \
                  -e 's|\.\(runner\|unknown\)_bookmark|.user_bookmark|g' \
                  "$target"
              fi

              echo "Copied $target ($(wc -c < "$target" | tr -d ' ') bytes)"
            done
          done

          echo ""
          echo "All profile files in .build/:"
          ls -la .build/profile_bashrc_*.sh 2>/dev/null || echo "  (none)"

      - name: Build & Verification Summary
        if: always()
        run: |
          function get_status_icon() {
            case "$1" in
              success)  echo ":white_check_mark:" ;;
              failure)  echo ":x:" ;;
              skipped)  echo ":fast_forward:" ;;
              cancelled) echo ":no_entry_sign:" ;;
              *)        echo ":grey_question:" ;;
            esac
          }

          function format_duration() {
            local total=$1
            if [ -z "$total" ] || [ "$total" = "" ]; then
              echo "-"
              return
            fi
            if [ "$total" -ge 60 ]; then
              printf "%dm %ds" $((total / 60)) $((total % 60))
            else
              printf "%ds" "$total"
            fi
          }

          function format_verification() {
            local status="$1" summary="$2" failed_list="$3" warned_list="$4"
            local icon detail=""
            case "$status" in
              error)   icon=":x:" ;;
              warning) icon=":warning:" ;;
              ok)      icon=":white_check_mark:" ;;
              *)       icon=":grey_question:"; summary="N/A" ;;
            esac
            if [ -n "$failed_list" ]; then
              detail+=" — Missing: $failed_list"
            fi
            if [ -n "$warned_list" ]; then
              detail+=" — Warned: $warned_list"
            fi
            echo "$icon $summary$detail"
          }

          function format_download_verification() {
            local status="$1" summary="$2"
            local icon
            case "$status" in
              error)   icon=":x:" ;;
              ok)      icon=":white_check_mark:" ;;
              *)       icon=":grey_question:"; summary="N/A" ;;
            esac
            echo "$icon $summary"
          }

          PREP_START='${{ needs.prep.outputs.job-start-time }}'
          D_CI_PREP='${{ needs.prep.outputs.ci-prep-duration }}'
          D_PREP_TOTAL='${{ needs.prep.outputs.total-duration }}'
          D_UBUNTU='${{ needs.build-ubuntu.outputs.duration }}'
          D_RHEL='${{ needs.build-rhel.outputs.duration }}'
          D_ARCH='${{ needs.build-arch.outputs.duration }}'
          D_DEBIAN='${{ needs.build-debian.outputs.duration }}'
          D_MAC='${{ needs.build-mac.outputs.duration }}'

          NOW=$(date +%s)
          if [ -n "$PREP_START" ] && [ "$PREP_START" != "" ]; then
            D_WALL_CLOCK=$(( NOW - PREP_START ))
          else
            D_WALL_CLOCK=""
          fi

          echo "## Overall Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | Step | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.prep.outputs.ci-prep-outcome }}') | CI Prep | $(format_duration "$D_CI_PREP") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| | **Prep Total** | **$(format_duration "$D_PREP_TOTAL")** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.build-ubuntu.result }}') | Ubuntu | $(format_duration "$D_UBUNTU") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.build-rhel.result }}') | Fedora (RHEL) | $(format_duration "$D_RHEL") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.build-arch.result }}') | Arch Linux | $(format_duration "$D_ARCH") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.build-debian.result }}') | Debian | $(format_duration "$D_DEBIAN") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| $(get_status_icon '${{ needs.build-mac.result }}') | macOS | $(format_duration "$D_MAC") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| | **Wall Clock Total** | **$(format_duration "$D_WALL_CLOCK")** |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Verification Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| OS | Binary Verification | Download Asset Verification |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ubuntu | $(format_verification '${{ needs.build-ubuntu.outputs.binary-check-status }}' '${{ needs.build-ubuntu.outputs.binary-check-summary }}' '${{ needs.build-ubuntu.outputs.binary-check-failed-list }}' '${{ needs.build-ubuntu.outputs.binary-check-warned-list }}') | $(format_download_verification '${{ needs.build-ubuntu.outputs.download-check-status }}' '${{ needs.build-ubuntu.outputs.download-check-summary }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fedora (RHEL) | $(format_verification '${{ needs.build-rhel.outputs.binary-check-status }}' '${{ needs.build-rhel.outputs.binary-check-summary }}' '${{ needs.build-rhel.outputs.binary-check-failed-list }}' '${{ needs.build-rhel.outputs.binary-check-warned-list }}') | $(format_download_verification '${{ needs.build-rhel.outputs.download-check-status }}' '${{ needs.build-rhel.outputs.download-check-summary }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Arch Linux | $(format_verification '${{ needs.build-arch.outputs.binary-check-status }}' '${{ needs.build-arch.outputs.binary-check-summary }}' '${{ needs.build-arch.outputs.binary-check-failed-list }}' '${{ needs.build-arch.outputs.binary-check-warned-list }}') | $(format_download_verification '${{ needs.build-arch.outputs.download-check-status }}' '${{ needs.build-arch.outputs.download-check-summary }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Debian | $(format_verification '${{ needs.build-debian.outputs.binary-check-status }}' '${{ needs.build-debian.outputs.binary-check-summary }}' '${{ needs.build-debian.outputs.binary-check-failed-list }}' '${{ needs.build-debian.outputs.binary-check-warned-list }}') | $(format_download_verification '${{ needs.build-debian.outputs.download-check-status }}' '${{ needs.build-debian.outputs.download-check-summary }}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| macOS | $(format_verification '${{ needs.build-mac.outputs.binary-check-status }}' '${{ needs.build-mac.outputs.binary-check-summary }}' '${{ needs.build-mac.outputs.binary-check-failed-list }}' '${{ needs.build-mac.outputs.binary-check-warned-list }}') | $(format_download_verification '${{ needs.build-mac.outputs.download-check-status }}' '${{ needs.build-mac.outputs.download-check-summary }}') |" >> "$GITHUB_STEP_SUMMARY"

          # 360-view package install matrix — pivots each per-OS install
          # summary TSV (emitted by .github/actions/ci-build/action.yml) into
          # one table where rows are packages and columns are OSes. Each cell
          # shows status icon + duration so you can see at a glance which
          # packages installed cleanly on which platforms. :wrench: next to
          # the package name marks optional (warn-tier or unchecked) packages.
          declare -A install_cell
          declare -A install_optional
          declare -A install_pkgs_seen
          install_oses=(ubuntu rhel arch debian mac)
          install_os_labels=("Ubuntu" "Fedora (RHEL)" "Arch Linux" "Debian" "macOS")
          install_matrix_total=0

          for install_os in "${install_oses[@]}"; do
            install_tsv="/tmp/install-summaries/logs-build-${install_os}/install-summary.tsv"
            if [ ! -f "$install_tsv" ]; then continue; fi
            while IFS=$'\t' read -r ipkg imanager istatus iduration itier; do
              [ -z "$ipkg" ] && continue
              install_pkgs_seen["$ipkg"]=1
              install_matrix_total=$((install_matrix_total + 1))
              case "$istatus" in
                success)  cell_icon=":white_check_mark:" ;;
                skipped)  cell_icon=":fast_forward:" ;;
                timeout)  cell_icon=":pause_button:" ;;
                error)    cell_icon=":x:" ;;
                *)        cell_icon=":grey_question:" ;;
              esac
              if [ "$istatus" = "success" ] && [ -n "$iduration" ] && [ "$iduration" != "0" ]; then
                install_cell["$ipkg|$install_os"]="$cell_icon ${iduration}s"
              else
                install_cell["$ipkg|$install_os"]="$cell_icon"
              fi
              if [ "$itier" = "optional" ]; then
                install_optional["$ipkg"]=1
              fi
            done < "$install_tsv"
          done

          if [ "$install_matrix_total" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details>" >> "$GITHUB_STEP_SUMMARY"
            echo "<summary><h3>Package Install Matrix (${#install_pkgs_seen[@]} packages × ${#install_oses[@]} OSes)</h3></summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_:wrench: = optional (warn-tier or unchecked) · :white_check_mark: success · :fast_forward: skipped · :pause_button: timeout · :x: error · — not attempted_" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Build header row
            install_header="| Package |"
            install_sep="|---|"
            for install_label in "${install_os_labels[@]}"; do
              install_header+=" $install_label |"
              install_sep+="---|"
            done
            echo "$install_header" >> "$GITHUB_STEP_SUMMARY"
            echo "$install_sep" >> "$GITHUB_STEP_SUMMARY"

            # Sort package names case-insensitively for stable ordering.
            sorted_install_pkgs=$(printf '%s\n' "${!install_pkgs_seen[@]}" | sort -f)
            while IFS= read -r ipkg; do
              [ -z "$ipkg" ] && continue
              if [ "${install_optional[$ipkg]:-0}" = "1" ]; then
                install_pkg_label="\`$ipkg\` :wrench:"
              else
                install_pkg_label="\`$ipkg\`"
              fi
              install_row="| $install_pkg_label |"
              for install_os in "${install_oses[@]}"; do
                install_row+=" ${install_cell[$ipkg|$install_os]:-—} |"
              done
              echo "$install_row" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$sorted_install_pkgs"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run Tests and Generate Summary
        env:
          NO_COLOR: 1
        run: |
          any_failed=0
          summary=""

          function run_test_suite() {
            local name="$1" target="$2"
            local t0 output rc
            t0=$(date +%s)
            output=$(make "$target" 2>&1) && rc=0 || rc=1
            local duration=$(( $(date +%s) - t0 ))

            if [ "$rc" = "0" ]; then
              echo "::notice::PASS: $name (${duration}s)"
              summary+="| :white_check_mark: | $name | ${duration}s |"$'\n'
            else
              echo "::group::FAIL: $name (${duration}s)"
              echo "$output"
              echo "::endgroup::"
              summary+="| :x: | $name | ${duration}s |"$'\n'
              any_failed=1
            fi

            # Collapsible details with test output
            summary+=$'\n'"<details><summary>$name output</summary>"$'\n\n'"\`\`\`"$'\n'"$output"$'\n'"\`\`\`"$'\n'"</details>"$'\n\n'
          }

          run_test_suite "Unit Tests" "ci_test_unit"
          run_test_suite "Profile Syntax" "ci_test_profile"
          run_test_suite "Smoke Tests" "ci_test_smoke"
          run_test_suite "Build Config Shape" "ci_test_buildconfig"
          run_test_suite "Coverage" "ci_test_coverage"

          {
            echo "## Test Results"
            echo ""
            echo "| Result | Suite | Duration |"
            echo "|--------|-------|----------|"
            echo "$summary"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$any_failed" = "1" ]; then
            echo "::error::One or more test suites failed"
            exit 1
          fi

      # Render a "## Coverage" section in the job summary by reading
      # coverage/coverage-summary.json (produced by ci_test_coverage above).
      # The thresholds mirror vitest.config.js — keep them in sync if you change
      # the gate. We never fail the build here; the gate failure (if any) already
      # bubbled up from `ci_test_coverage` and was captured in Test Results.
      - name: Coverage Summary
        if: always()
        env:
          THRESHOLD_LINES: 42
          THRESHOLD_STATEMENTS: 44
          THRESHOLD_BRANCHES: 42
          THRESHOLD_FUNCTIONS: 52
        run: |
          set -euo pipefail
          summary_file="coverage/coverage-summary.json"
          {
            echo ""
            echo "## Coverage"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ ! -f "$summary_file" ]; then
            echo "> Coverage report not generated (\`ci_test_coverage\` did not produce \`$summary_file\`)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Render the totals table.
          node --input-type=module -e "
          import fs from 'fs';
          const j = JSON.parse(fs.readFileSync('$summary_file', 'utf-8'));
          const t = j.total;
          const T = {
            lines: Number(process.env.THRESHOLD_LINES),
            statements: Number(process.env.THRESHOLD_STATEMENTS),
            branches: Number(process.env.THRESHOLD_BRANCHES),
            functions: Number(process.env.THRESHOLD_FUNCTIONS),
          };
          const rows = ['lines', 'statements', 'branches', 'functions'].map((m) => {
            const pct = t[m].pct;
            const thr = T[m];
            const status = pct >= thr ? ':white_check_mark: pass' : ':x: fail';
            return \`| \${m} | \${pct.toFixed(2)}% (\${t[m].covered}/\${t[m].total}) | \${thr}% | \${status} |\`;
          }).join('\n');
          const md = [
            '| Metric | Coverage | Threshold | Status |',
            '|--------|----------|-----------|--------|',
            rows,
            '',
            '<details><summary>Per-file coverage (top 20 by line %)</summary>',
            '',
            '| File | Lines | Statements | Branches | Functions |',
            '|------|-------|------------|----------|-----------|',
          ];
          const files = Object.entries(j)
            .filter(([k]) => k !== 'total')
            .map(([file, d]) => ({ file, l: d.lines.pct, s: d.statements.pct, b: d.branches.pct, f: d.functions.pct }))
            .sort((a, b) => b.l - a.l)
            .slice(0, 20);
          for (const f of files) {
            const rel = f.file.replace(process.cwd() + '/', '');
            md.push(\`| \\\`\${rel}\\\` | \${f.l.toFixed(1)}% | \${f.s.toFixed(1)}% | \${f.b.toFixed(1)}% | \${f.f.toFixed(1)}% |\`);
          }
          md.push('', '</details>', '');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md.join('\n') + '\n');
          "

      # Make the full HTML coverage report downloadable from the run page.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Tag successful build
        if: github.event_name == 'push'
        run: |
          TAG="v0.$(date -u +'%Y%m%d').${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
